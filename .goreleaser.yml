version: 2

project_name: runner-guard

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./...

builds:
  - main: ./cmd/runner-guard
    binary: runner-guard
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
      - -X github.com/Vigilant-LLC/runner-guard/v3/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

# Using brews (deprecated in v2.10 but still functional).
# homebrew_casks is the replacement but designed for GUI apps.
# Will migrate when GoReleaser stabilizes cask support for CLI binaries.
brews:
  - repository:
      owner: Vigilant-LLC
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Vigilant-LLC/runner-guard"
    description: "CI/CD supply chain security scanner for GitHub Actions"
    license: "AGPL-3.0"
    install: |
      bin.install "runner-guard"
    test: |
      system "#{bin}/runner-guard", "version"

release:
  github:
    owner: Vigilant-LLC
    name: runner-guard
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
