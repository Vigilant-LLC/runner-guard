# Compromised Package Database
# Known malicious package versions from confirmed supply chain attacks.
# Updated as new compromises are confirmed.
#
# Format:
#   - name: package name as it appears in the registry
#     ecosystem: npm | pypi | go
#     versions: list of compromised version strings
#     campaign: threat actor or campaign name
#     date: date of compromise (YYYY-MM-DD)
#     severity: critical | high
#     description: brief description of the compromise
#     references: list of URLs

