version: 1
last_updated: "2026-04-23"
campaign: TeamPCP-Telnyx
description: >
  TeamPCP compromised the Telnyx Python SDK on PyPI on March 27, 2026 as
  part of the broader open source software supply chain attack campaign.
  Versions 4.87.1 and 4.87.2 contained a three-stage payload hidden
  inside WAV audio files using steganography to evade signature-based
  detection. The attack added Windows Startup folder persistence, reduced
  the malicious package footprint by 87 percent, and renamed persistence
  artifacts to evade detection rules written after the earlier LiteLLM
  disclosure three days prior. The RSA-4096 encryption key is
  byte-for-byte identical to the LiteLLM payload, providing strong
  attribution linking the two PyPI supply chain compromises. Vigilant's
  research on open source CI/CD security risk across the top 50,000
  GitHub repositories is available at
  https://www.vigilantdefense.com/research/github-top-50k-repos-cicd-security-scan

signatures:
  # Behavioral IOCs
  - id: telnyx-wav-hidden-payload
    threat_actor: TeamPCP
    type: ioc-behavior
    pattern: "(?i)\\.wav.*\\bread\\b.*\\bbinary\\b|\\.wav.*struct\\.unpack|wave\\.open.*\\bframes\\b.*decode"
    description: "Reading binary data from WAV audio files for steganographic payload extraction, a detection-evasion technique used in the Telnyx PyPI supply chain compromise"
    severity: critical
    first_seen: "2026-03"

  - id: telnyx-startup-persistence
    threat_actor: TeamPCP
    type: ioc-filepath
    pattern: "(?i)AppData.*\\\\Microsoft\\\\Windows\\\\Start Menu\\\\Programs\\\\Startup|~/\\.config/autostart"
    description: "Windows Startup folder or Linux autostart persistence used by the Telnyx RAT variant to survive developer workstation reboots"
    severity: critical
    first_seen: "2026-03"

  - id: telnyx-hidden-persistence
    threat_actor: TeamPCP
    type: ioc-filepath
    pattern: "(?i)/tmp/\\.telnyx|/var/tmp/\\.[a-z]{5,}|%LOCALAPPDATA%\\\\\\.[a-z]{5,}"
    description: "Hidden persistence paths in temp directories, a Telnyx campaign evasion pattern that renamed artifacts after the LiteLLM disclosure"
    severity: high
    first_seen: "2026-03"

  # Package IOCs
  - id: telnyx-compromised-versions
    threat_actor: TeamPCP
    type: ioc-package
    pattern: "(?i)telnyx==4\\.87\\.1|telnyx==4\\.87\\.2|telnyx@4\\.87\\.[12]"
    description: "Known compromised Telnyx PyPI versions carrying the embedded Remote Access Trojan from the TeamPCP open source supply chain campaign"
    severity: critical
    first_seen: "2026-03"

  - id: telnyx-aes-rsa-exfil
    threat_actor: TeamPCP
    type: ioc-behavior
    pattern: "(?i)AES.*256.*CBC.*RSA.*OAEP|RSA.*4096.*tpcp|OAEP.*encrypt.*tar\\.gz"
    description: "AES-256-CBC plus RSA-4096 OAEP hybrid encryption chain for credential exfiltration, a TeamPCP signature shared between the LiteLLM and Telnyx compromises"
    severity: critical
    first_seen: "2026-03"
