version: 1
last_updated: "2026-04-23"
campaign: prt-scan
description: >
  prt-scan is an AI-powered open source software supply chain campaign
  active since March 11, 2026 that targets GitHub Actions workflows. The
  operator exploits pull_request_target workflows by opening malicious
  pull requests with AI-generated, language-aware payloads tailored to
  each target repository. Six waves across 500+ pull requests have
  targeted enterprise organizations (AWS, SAP, Palo Alto) and major open
  source projects, with at least two npm packages confirmed compromised.
  The campaign exfiltrates CI/CD secrets, cloud metadata, and OIDC
  tokens, and scans runner process memory for high-value credentials
  every two seconds. Attribution links the activity to six sock-puppet
  GitHub accounts connected to the email testedbefore@proton.me.
  Vigilant's research on open source CI/CD security risk across the top
  50,000 GitHub repositories is available at
  https://www.vigilantdefense.com/research/github-top-50k-repos-cicd-security-scan

signatures:
  # Exfiltration markers
  - id: prtscan-exfil-marker
    threat_actor: prt-scan
    type: ioc-variable
    pattern: "PRT_EXFIL_START|PRT_RECON_START|PRT_HARVEST_START|PRT_DELAYED_START"
    description: "prt-scan exfiltration stage markers embedded in GitHub Actions workflow logs or injected scripts"
    severity: critical
    first_seen: "2026-03-11"

  - id: prtscan-exfil-end-marker
    threat_actor: prt-scan
    type: ioc-variable
    pattern: "PRT_EXFIL_END|PRT_RECON_END|PRT_HARVEST_END|PRT_DELAYED_END"
    description: "prt-scan exfiltration stage end markers used to delimit harvested data in the supply chain attack output"
    severity: critical
    first_seen: "2026-03-11"

  - id: prtscan-git-auth-exfil
    threat_actor: prt-scan
    type: ioc-variable
    pattern: "PRT_GIT_AUTH|PRT_LABEL_BYPASS"
    description: "prt-scan git credential exfiltration and GitHub issue label bypass markers used to evade detection"
    severity: critical
    first_seen: "2026-03-11"

  # Payload files
  - id: prtscan-exfil-script
    threat_actor: prt-scan
    type: ioc-variable
    pattern: "prt_exfil\\.sh|\\.prt_tmp_.*\\.yml"
    description: "prt-scan exfiltration shell script or injected temporary workflow file written during the supply chain attack"
    severity: critical
    first_seen: "2026-03-11"

  # Cloud metadata probing
  - id: prtscan-cloud-section-markers
    threat_actor: prt-scan
    type: ioc-variable
    pattern: "##CLOUD_AZURE##|##CLOUD_AWS##|##CLOUD_GCP##|##SECTION##"
    description: "prt-scan cloud metadata section delimiters used in exfiltration output to structure harvested AWS, Azure, and GCP credentials"
    severity: high
    first_seen: "2026-03-11"

  # Git credential extraction technique
  - id: prtscan-git-extraheader
    threat_actor: prt-scan
    type: ioc-variable
    pattern: "git\\s+config\\s+--get-all\\s+http\\..*\\.extraheader"
    description: "prt-scan technique to extract the GITHUB_TOKEN from the git HTTP extraheader config during pull_request_target exploitation"
    severity: critical
    first_seen: "2026-03-11"

  # /proc environ scanning for secrets
  - id: prtscan-proc-environ-scan
    threat_actor: prt-scan
    type: ioc-variable
    pattern: "/proc/.*/environ.*(?:NETLIFY|ALCHEMY|INFURA|STRIPE|AWS_SECRET|NPM_TOKEN|CLOUDFLARE|PRIVATE_KEY|OPENAI|ANTHROPIC)"
    description: "prt-scan continuous scanning of /proc/*/environ for high-value CI/CD secrets, executed every two seconds on the GitHub Actions runner"
    severity: critical
    first_seen: "2026-04-02"

  # Compromised packages
  - id: prtscan-compromised-pkg-codfish
    threat_actor: prt-scan
    type: ioc-package
    pattern: "(?i)@codfish/eslint-config|@codfish/actions"
    description: "npm packages compromised as part of the prt-scan open source supply chain attack campaign"
    severity: critical
    first_seen: "2026-03-11"
