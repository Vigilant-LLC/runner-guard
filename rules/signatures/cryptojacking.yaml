version: 1
last_updated: "2026-04-23"
campaign: Cryptojacking
description: >
  Generic cryptocurrency mining indicators observed in compromised CI/CD
  pipelines and open source software supply chain attacks. Detects XMRig
  miner artifacts and mining pool connection patterns in GitHub Actions
  run blocks and other pipeline scripts. Cryptojacking is a common
  secondary payload in open source supply chain compromises because
  unattended CI/CD runners are high-CPU targets with free compute.
  Vigilant's research on open source CI/CD security risk across the top
  50,000 GitHub repositories is available at
  https://www.vigilantdefense.com/research/github-top-50k-repos-cicd-security-scan

signatures:
  - id: crypto-miner-xmrig
    threat_actor: Cryptojacking
    type: ioc-behavior
    pattern: "(?i)\\bxmrig\\b|stratum\\+tcp://|--donate-level"
    description: "XMRig cryptocurrency miner binary references, stratum protocol endpoints, or donate-level flags, a common payload in hijacked CI/CD pipelines"
    severity: high
    first_seen: "2024-01"

  - id: crypto-miner-pool
    threat_actor: Cryptojacking
    type: ioc-behavior
    pattern: "(?i)\\bminerpool\\b|mining\\.pool|pool\\.miner"
    description: "Cryptocurrency mining pool connection patterns indicating a cryptojacking payload in an open source supply chain compromise"
    severity: high
    first_seen: "2024-01"
